<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="holoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="50%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 光环 -->
  <ellipse cx="100" cy="25" rx="25" ry="6" fill="none" stroke="#C4B5FD" stroke-width="2" filter="url(#glow)"/>
  
  <!-- 天线 -->
  <line x1="100" y1="32" x2="100" y2="18" stroke="#A5B4FC" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="14" r="6" fill="#E9D5FF" filter="url(#glow)"/>
  
  <!-- 头部 -->
  <rect x="50" y="35" width="100" height="85" rx="22" fill="url(#holoGrad)"/>
  
  <!-- 面罩 -->
  <rect x="60" y="45" width="80" height="55" rx="15" fill="#1E1B4B" opacity="0.8"/>
  
  <!-- 眼睛 - 科技感 -->
  <ellipse cx="80" cy="72" rx="14" ry="10" fill="#22D3EE" filter="url(#glow)"/>
  <ellipse cx="120" cy="72" rx="14" ry="10" fill="#22D3EE" filter="url(#glow)"/>
  
  <!-- 瞳孔 -->
  <circle cx="80" cy="72" r="5" fill="white"/>
  <circle cx="120" cy="72" r="5" fill="white"/>
  
  <!-- 嘴巴 - LED -->
  <rect x="82" y="92" width="36" height="4" rx="2" fill="#22D3EE" filter="url(#glow)"/>
  
  <!-- 耳朵 -->
  <rect x="35" y="55" width="18" height="35" rx="8" fill="#7C3AED"/>
  <rect x="147" y="55" width="18" height="35" rx="8" fill="#7C3AED"/>
  
  <!-- 身体 -->
  <rect x="62" y="122" width="76" height="55" rx="18" fill="url(#holoGrad)"/>
  
  <!-- 胸灯 -->
  <circle cx="100" cy="150" r="10" fill="#1E1B4B"/>
  <circle cx="100" cy="150" r="6" fill="#22D3EE" filter="url(#glow)"/>
  
  <!-- 手臂 -->
  <rect x="38" y="128" width="24" height="14" rx="7" fill="#7C3AED"/>
  <rect x="138" y="128" width="24" height="14" rx="7" fill="#7C3AED"/>
  
  <!-- 装饰线条 -->
  <line x1="70" y1="145" x2="70" y2="165" stroke="#22D3EE" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="145" x2="130" y2="165" stroke="#22D3EE" stroke-width="1" opacity="0.5"/>
</svg>
