<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="antennaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  
  <!-- 天线 -->
  <line x1="100" y1="35" x2="100" y2="18" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="14" r="8" fill="url(#antennaGrad)"/>
  
  <!-- 头部 -->
  <rect x="45" y="38" width="110" height="90" rx="25" fill="url(#bodyGrad)"/>
  
  <!-- 耳朵 -->
  <rect x="30" y="60" width="18" height="30" rx="6" fill="#94A3B8"/>
  <rect x="152" y="60" width="18" height="30" rx="6" fill="#94A3B8"/>
  
  <!-- 眼睛背景 -->
  <ellipse cx="75" cy="78" rx="18" ry="20" fill="white"/>
  <ellipse cx="125" cy="78" rx="18" ry="20" fill="white"/>
  
  <!-- 眼睛 -->
  <circle cx="78" cy="80" r="10" fill="#1E293B"/>
  <circle cx="122" cy="80" r="10" fill="#1E293B"/>
  
  <!-- 眼睛高光 -->
  <circle cx="82" cy="76" r="4" fill="white"/>
  <circle cx="126" cy="76" r="4" fill="white"/>
  
  <!-- 腮红 -->
  <ellipse cx="58" cy="100" rx="10" ry="6" fill="#F9A8D4" opacity="0.7"/>
  <ellipse cx="142" cy="100" rx="10" ry="6" fill="#F9A8D4" opacity="0.7"/>
  
  <!-- 嘴巴 -->
  <path d="M 85 105 Q 100 118 115 105" stroke="#1E293B" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 身体 -->
  <rect x="60" y="130" width="80" height="50" rx="15" fill="url(#bodyGrad)"/>
  
  <!-- 身体装饰 -->
  <circle cx="100" cy="155" r="8" fill="#FCD34D"/>
  <circle cx="100" cy="155" r="4" fill="#F59E0B"/>
  
  <!-- 手臂 -->
  <rect x="35" y="135" width="25" height="15" rx="7" fill="#94A3B8"/>
  <rect x="140" y="135" width="25" height="15" rx="7" fill="#94A3B8"/>
  
  <!-- 挥手效果线 -->
  <path d="M 165 125 Q 175 120 180 115" stroke="#FCD34D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 168 130 Q 178 128 185 125" stroke="#FCD34D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 165 135 Q 175 135 182 133" stroke="#FCD34D" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
