  <circle cx="100" cy="160" r="4" fill="#059669"/>
  
  <!-- 星星装饰 -->
  <polygon points="30,50 32,56 38,56 33,60 35,66 30,62 25,66 27,60 22,56 28,56" fill="#FCD34D" opacity="0.8"/>
  <polygon points="170,40 171,43 174,43 172,45 173,48 170,46 167,48 168,45 166,43 169,43" fill="#FCD34D" opacity="0.6"/>
  <polygon points="165,100 166,103 169,103 167,105 168,108 165,106 162,108 163,105 161,103 164,103" fill="#FCD34D" opacity="0.5"/>
