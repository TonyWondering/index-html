<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="spaceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="visorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="50%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
  </defs>
  
  <!-- 头盔 -->
  <circle cx="100" cy="85" r="60" fill="#E2E8F0"/>
  <circle cx="100" cy="85" r="55" fill="url(#spaceGrad)"/>
  
  <!-- 面罩 -->
  <ellipse cx="100" cy="82" rx="38" ry="35" fill="url(#visorGrad)" opacity="0.9"/>
  
  <!-- 面罩反光 -->
  <ellipse cx="85" cy="72" rx="15" ry="10" fill="white" opacity="0.3" transform="rotate(-20 85 72)"/>
  
  <!-- 眼睛 - 发光 -->
  <circle cx="85" cy="85" r="8" fill="#FCD34D" opacity="0.9"/>
  <circle cx="115" cy="85" r="8" fill="#FCD34D" opacity="0.9"/>
  <circle cx="85" cy="85" r="4" fill="white"/>
  <circle cx="115" cy="85" r="4" fill="white"/>
  
  <!-- 嘴巴 - LED点阵 -->
  <circle cx="92" cy="100" r="2" fill="#34D399"/>
  <circle cx="98" cy="100" r="2" fill="#34D399"/>
  <circle cx="104" cy="100" r="2" fill="#34D399"/>
  <circle cx="110" cy="100" r="2" fill="#34D399"/>
  
  <!-- 头盔装饰 -->
  <rect x="42" y="65" width="12" height="25" rx="4" fill="#475569"/>
  <rect x="146" y="65" width="12" height="25" rx="4" fill="#475569"/>
  
  <!-- 天线 -->
  <line x1="100" y1="30" x2="100" y2="12" stroke="#475569" stroke-width="3"/>
  <circle cx="100" cy="10" r="5" fill="#EF4444"/>
  
  <!-- 身体 - 宇航服 -->
  <rect x="60" y="140" width="80" height="50" rx="15" fill="#E2E8F0"/>
  <rect x="65" y="145" width="70" height="40" rx="12" fill="url(#spaceGrad)"/>
  
  <!-- 胸部控制面板 -->
  <rect x="78" y="152" width="44" height="25" rx="5" fill="#475569"/>
  <circle cx="88" cy="160" r="4" fill="#EF4444"/>
  <circle cx="100" cy="160" r="4" fill="#FCD34D"/>
  <circle cx="112" cy="160" r="4" fill="#34D399"/>
  <rect x="82" y="168" width="36" height="3" rx="1.5" fill="#60A5FA"/>
  
  <!-- 手臂 -->
  <rect x="35" y="148" width="25" height="14" rx="7" fill="#E2E8F0"/>
  <rect x="140" y="148" width="25" height="14" rx="7" fill="#E2E8F0"/>
  
  <!-- 星星 -->
  <circle cx="25" cy="45" r="2" fill="#FCD34D"/>
  <circle cx="175" cy="55" r="2" fill="#FCD34D"/>
  <circle cx="180" cy="120" r="1.5" fill="#FCD34D"/>
  <circle cx="20" cy="110" r="1.5" fill="#FCD34D"/>
</svg>
