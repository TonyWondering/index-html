<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  
  <!-- 猫耳 -->
  <polygon points="55,45 40,10 75,35" fill="url(#catGrad)"/>
  <polygon points="145,45 160,10 125,35" fill="url(#catGrad)"/>
  <polygon points="58,42 48,18 72,37" fill="#FCE7F3"/>
  <polygon points="142,42 152,18 128,37" fill="#FCE7F3"/>
  
  <!-- 头部 -->
  <circle cx="100" cy="80" r="52" fill="url(#catGrad)"/>
  
  <!-- 耳朵内侧 -->
  <ellipse cx="55" cy="70" rx="8" ry="12" fill="#FCE7F3"/>
  <ellipse cx="145" cy="70" rx="8" ry="12" fill="#FCE7F3"/>
  
  <!-- 眼睛 - 猫眼 -->
  <ellipse cx="78" cy="78" rx="12" ry="14" fill="white"/>
  <ellipse cx="122" cy="78" rx="12" ry="14" fill="white"/>
  <ellipse cx="78" cy="80" rx="7" ry="10" fill="#1E293B"/>
  <ellipse cx="122" cy="80" rx="7" ry="10" fill="#1E293B"/>
  <circle cx="82" cy="76" r="3" fill="white"/>
  <circle cx="126" cy="76" r="3" fill="white"/>
  
  <!-- 鼻子 -->
  <ellipse cx="100" cy="92" rx="4" ry="3" fill="#BE185D"/>
  
