  <!-- 胡须 -->
  <line x1="55" y1="88" x2="35" y2="82" stroke="#BE185D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="95" x2="32" y2="95" stroke="#BE185D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="102" x2="35" y2="108" stroke="#BE185D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="145" y1="88" x2="165" y2="82" stroke="#BE185D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="145" y1="95" x2="168" y2="95" stroke="#BE185D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="145" y1="102" x2="165" y2="108" stroke="#BE185D" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 腮红 -->
  <ellipse cx="65" cy="95" rx="8" ry="5" fill="#F9A8D4" opacity="0.7"/>
  <ellipse cx="135" cy="95" rx="8" ry="5" fill="#F9A8D4" opacity="0.7"/>
  
  <!-- 身体 -->
  <ellipse cx="100" cy="155" rx="40" ry="35" fill="url(#catGrad)"/>
  
  <!-- 肚子 -->
  <ellipse cx="100" cy="158" rx="25" ry="22" fill="#FCE7F3"/>
  
  <!-- 爪子 -->
  <ellipse cx="70" cy="175" rx="12" ry="8" fill="url(#catGrad)"/>
  <ellipse cx="130" cy="175" rx="12" ry="8" fill="url(#catGrad)"/>
  <circle cx="65" cy="173" r="3" fill="#FCE7F3"/>
  <circle cx="70" cy="170" r="3" fill="#FCE7F3"/>
  <circle cx="75" cy="173" r="3" fill="#FCE7F3"/>
  <circle cx="125" cy="173" r="3" fill="#FCE7F3"/>
  <circle cx="130" cy="170" r="3" fill="#FCE7F3"/>
  <circle cx="135" cy="173" r="3" fill="#FCE7F3"/>
  
  <!-- 机器人标记 -->
  <rect x="90" y="148" width="20" height="16" rx="4" fill="#BE185D"/>
